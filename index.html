<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0b0f">
  <title>StockSmart — Inventory</title>
  <style>
    :root {
      --bg: #0a0b0f;
      --surface: #111318;
      --surface2: #191c25;
      --surface3: #1e2230;
      --border: #252a38;
      --accent: #6366f1;
      --accent-dim: rgba(99,102,241,0.15);
      --accent-hover: #818cf8;
      --green: #10b981;
      --green-dim: rgba(16,185,129,0.15);
      --amber: #f59e0b;
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.12);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-muted: #4b5568;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Header ── */
    .header {
      background: rgba(17,19,24,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      user-select: none;
    }
    .logo-mark {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(99,102,241,0.4);
    }
    .logo-text {
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .logo-sub {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .header-stats {
      display: flex;
      gap: 20px;
      margin-left: 8px;
    }
    .hstat {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.3;
    }
    .hstat strong {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--surface3); color: var(--text); }

    .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.2); }

    .btn-success { background: var(--green); color: #fff; }
    .btn-success:hover:not(:disabled) { background: #059669; }

    .btn-sm  { padding: 6px 12px; font-size: 13px; }
    .btn-lg  { padding: 11px 22px; font-size: 15px; }
    .btn-full { width: 100%; }

    /* ── Main ── */
    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-wrap {
      flex: 1;
      min-width: 180px;
      position: relative;
    }
    .search-wrap .ico {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 12px 9px 36px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { outline: none; border-color: var(--accent); }

    .filter-sel {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      min-width: 140px;
      cursor: pointer;
    }
    .filter-sel:focus { outline: none; border-color: var(--accent); }
    .filter-sel option { background: #1a1f2e; }

    .view-pills {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      flex-shrink: 0;
    }
    .vpill {
      padding: 8px 11px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
    }
    .vpill.active { background: var(--accent); color: #fff; }
    .vpill:not(.active):hover { background: var(--surface2); color: var(--text); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .list-mode.grid {
      grid-template-columns: 1fr;
      gap: 8px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: rgba(99,102,241,0.5);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .card:active { transform: scale(0.99); }

    .card-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--surface2);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-thumb-icon { font-size: 36px; opacity: 0.35; }

    .card-body { padding: 12px 14px 14px; }
    .card-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }
    .card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 7px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 100px;
    }
    .price-tag {
      font-size: 15px;
      font-weight: 800;
      color: var(--green);
    }
    .card-meta {
      display: flex;
      gap: 10px;
      font-size: 12px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    /* List mode card overrides */
    .list-mode .card { display: flex; flex-direction: row; }
    .list-mode .card-thumb {
      width: 88px;
      height: 88px;
      aspect-ratio: unset;
      flex-shrink: 0;
    }
    .list-mode .card-thumb-icon { font-size: 28px; }
    .list-mode .card-body { flex: 1; padding: 12px; display: flex; flex-direction: column; justify-content: center; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      grid-column: 1/-1;
    }
    .empty-icon { font-size: 52px; margin-bottom: 16px; opacity: 0.3; }
    .empty h3 { font-size: 18px; font-weight: 700; color: var(--text-dim); margin-bottom: 6px; }
    .empty p  { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }

    /* ── Modal overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    @media (min-width: 600px) {
      .overlay { align-items: center; padding: 20px; }
    }

    /* ── Modal sheet ── */
    .sheet {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%;
      max-height: 96dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 0 20px 24px;
    }
    @media (min-width: 600px) {
      .sheet { border-radius: var(--radius); max-width: 560px; max-height: 92vh; }
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 18px;
    }
    @media (min-width: 600px) { .sheet-handle { display: none; } }

    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }
    @media (min-width: 600px) { .sheet-head { padding-top: 20px; } }

    .sheet-title { font-size: 17px; font-weight: 800; }
    .close-x {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 14px;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .close-x:hover { background: var(--surface3); color: var(--text); }

    /* ── Form ── */
    .fgroup { margin-bottom: 14px; }
    .flabel {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .finput, .fselect, .ftextarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .finput::placeholder, .ftextarea::placeholder { color: var(--text-muted); }
    .finput:focus, .fselect:focus, .ftextarea:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface3);
    }
    .fselect option { background: #1a1f2e; }
    .ftextarea { resize: vertical; min-height: 76px; line-height: 1.5; }
    .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── Photo zone ── */
    .photo-zone {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--surface2);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 13px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s;
      margin-bottom: 10px;
    }
    .photo-zone:hover { border-color: var(--accent); }
    .photo-zone.loaded {
      border-style: solid;
      border-color: rgba(99,102,241,0.5);
      cursor: default;
    }
    .photo-zone img { width: 100%; height: 100%; object-fit: cover; }

    .photo-btns {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .ai-btn {
      flex: 1;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      border: none;
    }
    .ai-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--accent-hover), #a78bfa);
    }
    .ai-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .ai-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      background: linear-gradient(135deg, var(--accent-dim), rgba(139,92,246,0.12));
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 100px;
      color: var(--accent-hover);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.55s linear infinite;
      flex-shrink: 0;
    }
    .spin-lg {
      width: 32px; height: 32px;
      border-width: 3px;
      border-color: rgba(99,102,241,0.2);
      border-top-color: var(--accent);
    }

    /* ── Loading screen ── */
    .loading-veil {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 400;
    }
    .loading-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      font-size: 14px;
      color: var(--text-dim);
      box-shadow: var(--shadow);
    }

    /* ── Toast ── */
    @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity:0; } to { transform: translateX(-50%) translateY(0); opacity:1; } }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      box-shadow: var(--shadow);
      white-space: nowrap;
      animation: slideUp 0.2s ease;
      pointer-events: none;
    }
    .toast.ok  { border-color: rgba(16,185,129,0.4); }
    .toast.err { border-color: rgba(239,68,68,0.4);  }

    /* ── Detail ── */
    .detail-photo {
      width: 100%;
      border-radius: var(--radius-sm);
      object-fit: cover;
      max-height: 260px;
      margin-bottom: 16px;
      background: var(--surface2);
    }
    .detail-photo-placeholder {
      width: 100%;
      height: 160px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      opacity: 0.3;
      margin-bottom: 16px;
    }
    .dfields { display: grid; gap: 12px; }
    .dfield-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .dfield-val { font-size: 15px; color: var(--text); }
    .detail-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      .header-stats { display: none; }
      .filter-sel { min-width: 120px; }
      .frow { grid-template-columns: 1fr; }
    }
    @media (max-width: 360px) {
      .main { padding: 14px; }
    }

    /* ── Transition utils ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- ═══════ HEADER ═══════ -->
<header class="header">
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-mark">📦</div>
      <div>
        <div class="logo-text">StockSmart</div>
        <div class="logo-sub">Inventory</div>
      </div>
    </a>
    <div class="header-stats">
      <div class="hstat"><strong id="statItems">—</strong>items</div>
      <div class="hstat"><strong id="statValue">—</strong>value</div>
    </div>
    <div class="header-right">
      <button class="btn btn-primary" onclick="openAdd()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" d="M12 5v14M5 12h14"/>
        </svg>
        Add Item
      </button>
    </div>
  </div>
</header>

<!-- ═══════ MAIN ═══════ -->
<main class="main">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg class="ico" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/>
      </svg>
      <input id="searchInput" class="search-input" type="search" placeholder="Search name, location, notes…" oninput="applyFilters()">
    </div>
    <select id="locFilter" class="filter-sel" onchange="applyFilters()">
      <option value="">All Locations</option>
    </select>
    <select id="catFilter" class="filter-sel" onchange="applyFilters()">
      <option value="">All Categories</option>
      <option>Electronics</option><option>Furniture</option><option>Clothing</option>
      <option>Tools</option><option>Food</option><option>Books</option>
      <option>Sports</option><option>Toys</option><option>Kitchen</option>
      <option>Office</option><option>Other</option>
    </select>
    <div class="view-pills">
      <button class="vpill active" id="vGrid" onclick="setView('grid')" title="Grid view">
        <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
      </button>
      <button class="vpill" id="vList" onclick="setView('list')" title="List view">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Item grid -->
  <div id="grid" class="grid"></div>
</main>

<!-- ═══════ ADD / EDIT MODAL ═══════ -->
<div id="addModal" class="overlay hidden" onclick="overlayClick(event,'addModal')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <span class="sheet-title" id="addTitle">Add Item</span>
      <button class="close-x" onclick="closeModal('addModal')">✕</button>
    </div>

    <!-- Photo zone -->
    <div id="photoZone" class="photo-zone" onclick="zoneClick()">
      <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24" opacity=".35">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
        <circle cx="12" cy="13" r="3"/>
      </svg>
      <span id="zoneHint">Tap to add a photo</span>
    </div>

    <div class="photo-btns">
      <button class="btn btn-ghost btn-sm" onclick="triggerCamera()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
          <circle cx="12" cy="13" r="3"/>
        </svg>
        Camera
      </button>
      <button class="btn btn-ghost btn-sm" onclick="triggerFile()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
        </svg>
        Upload
      </button>
      <button id="aiBtn" class="btn btn-sm ai-btn" onclick="analyzePhoto()" disabled>
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636-.707.707M21 12h-1M4 12H3m3.343-5.657-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
        </svg>
        <span id="aiBtnTxt">Analyze with AI</span>
      </button>
    </div>

    <!-- Form fields -->
    <div class="fgroup">
      <label class="flabel">Item Name <span style="color:var(--red)">*</span></label>
      <input id="fName" class="finput" type="text" placeholder="e.g. Sony WH-1000XM5 Headphones">
    </div>
    <div class="frow">
      <div class="fgroup">
        <label class="flabel">Category</label>
        <select id="fCat" class="fselect">
          <option value="">Select…</option>
          <option>Electronics</option><option>Furniture</option><option>Clothing</option>
          <option>Tools</option><option>Food</option><option>Books</option>
          <option>Sports</option><option>Toys</option><option>Kitchen</option>
          <option>Office</option><option>Other</option>
        </select>
      </div>
      <div class="fgroup">
        <label class="flabel">Price ($)</label>
        <input id="fPrice" class="finput" type="number" min="0" step="0.01" placeholder="0.00">
      </div>
    </div>
    <div class="frow">
      <div class="fgroup">
        <label class="flabel">Quantity</label>
        <input id="fQty" class="finput" type="number" min="0" value="1">
      </div>
      <div class="fgroup">
        <label class="flabel">Box #</label>
        <input id="fBox" class="finput" type="text" placeholder="e.g. Box 3">
      </div>
    </div>
    <div class="fgroup">
      <label class="flabel">Location</label>
      <input id="fLoc" class="finput" type="text" placeholder="e.g. Garage, Attic, Office">
    </div>
    <div class="fgroup">
      <label class="flabel">Notes <span class="ai-pill">✦ AI</span></label>
      <textarea id="fNotes" class="ftextarea" placeholder="Description, condition, color…"></textarea>
    </div>

    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary btn-lg" style="flex:2" onclick="saveItem()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
        Save Item
      </button>
    </div>
  </div>
</div>

<!-- ═══════ DETAIL MODAL ═══════ -->
<div id="detailModal" class="overlay hidden" onclick="overlayClick(event,'detailModal')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <span class="sheet-title" id="detailTitle">Item Details</span>
      <button class="close-x" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<!-- Hidden inputs -->
<input type="file" id="fileIn"   accept="image/*" style="display:none" onchange="onFile(event)">
<input type="file" id="camIn"    accept="image/*" capture="environment" style="display:none" onchange="onFile(event)">

<script type="module">
// ─── Firebase ───────────────────────────────────────────────────────────────
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc,
  doc, onSnapshot, query, orderBy, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// Fetch Firebase config from server so the API key is never in client source
const _cfgRes = await fetch('/.netlify/functions/config');
if (!_cfgRes.ok) {
  document.getElementById('grid').innerHTML =
    `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">⚠️</div>
     <h3>Configuration error</h3><p>Could not load Firebase config. Is FIREBASE_API_KEY set in Netlify?</p></div>`;
  throw new Error('Failed to load Firebase config');
}
const firebaseConfig = await _cfgRes.json();
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ─── State ──────────────────────────────────────────────────────────────────
let items       = [];
let filtered    = [];
let currentView = 'grid';
let photoData   = null; // current base64 photo
let editingId   = null;

const CAT_COLORS = {
  Electronics: '#6366f1', Furniture: '#8b5cf6', Clothing: '#ec4899',
  Tools: '#f59e0b',       Food: '#10b981',       Books: '#3b82f6',
  Sports: '#ef4444',      Toys: '#f97316',        Kitchen: '#14b8a6',
  Office: '#64748b',      Other: '#94a3b8'
};

// ─── Firestore real-time sync ────────────────────────────────────────────────
onSnapshot(
  query(collection(db, 'inventory'), orderBy('createdAt', 'desc')),
  snap => {
    items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats();
    updateLocFilter();
    applyFilters();
  },
  err => {
    console.error('Firestore:', err);
    toast('Could not connect to Firestore. Check project settings.', 'err');
  }
);

// ─── Stats ──────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('statItems').textContent = items.length;
  const val = items.reduce((s, i) => s + (parseFloat(i.price)||0) * (parseInt(i.quantity)||1), 0);
  document.getElementById('statValue').textContent =
    '$' + val.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

// ─── Location filter options ─────────────────────────────────────────────────
function updateLocFilter() {
  const locs = [...new Set(items.map(i => i.location).filter(Boolean))].sort();
  const sel = document.getElementById('locFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Locations</option>';
  locs.forEach(l => {
    const o = document.createElement('option');
    o.value = o.textContent = l;
    if (l === cur) o.selected = true;
    sel.appendChild(o);
  });
}

// ─── Filter & render ─────────────────────────────────────────────────────────
window.applyFilters = function () {
  const q   = document.getElementById('searchInput').value.toLowerCase();
  const loc = document.getElementById('locFilter').value;
  const cat = document.getElementById('catFilter').value;

  filtered = items.filter(item => {
    const srch = !q ||
      (item.name     || '').toLowerCase().includes(q) ||
      (item.notes    || '').toLowerCase().includes(q) ||
      (item.location || '').toLowerCase().includes(q) ||
      (item.box      || '').toLowerCase().includes(q) ||
      (item.category || '').toLowerCase().includes(q);
    return srch && (!loc || item.location === loc) && (!cat || item.category === cat);
  });
  renderGrid();
};

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.className = currentView === 'list' ? 'grid list-mode' : 'grid';

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📦</div>
        <h3>${items.length === 0 ? 'No items yet' : 'No items match'}</h3>
        <p>${items.length === 0 ? 'Add your first item to start tracking inventory.' : 'Try a different search or filter.'}</p>
        ${items.length === 0 ? '<button class="btn btn-primary" onclick="openAdd()">Add First Item</button>' : ''}
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const col   = CAT_COLORS[item.category] || '#94a3b8';
    const thumb = item.photo
      ? `<img src="${item.photo}" alt="${xss(item.name)}" loading="lazy">`
      : `<div class="card-thumb-icon">📦</div>`;
    return `
      <div class="card" onclick="openDetail('${item.id}')">
        <div class="card-thumb">${thumb}</div>
        <div class="card-body">
          <div class="card-name">${xss(item.name || 'Unnamed')}</div>
          <div class="card-row">
            <span class="tag" style="background:${col}1a;color:${col}">${xss(item.category||'—')}</span>
            <span class="price-tag">$${(+( item.price||0)).toFixed(2)}</span>
          </div>
          <div class="card-meta">
            <span class="meta-item">
              <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-linecap="round"/>
                <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              ${xss(item.location || 'No location')}
            </span>
            <span class="meta-item">Qty <strong>${item.quantity||1}</strong></span>
            ${item.box ? `<span class="meta-item">${xss(item.box)}</span>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

// ─── View toggle ─────────────────────────────────────────────────────────────
window.setView = function (v) {
  currentView = v;
  document.getElementById('vGrid').classList.toggle('active', v === 'grid');
  document.getElementById('vList').classList.toggle('active', v === 'list');
  renderGrid();
};

// ─── Add / Edit modal ────────────────────────────────────────────────────────
window.openAdd = function (id = null) {
  editingId = id;
  document.getElementById('addTitle').textContent = id ? 'Edit Item' : 'Add Item';

  if (id) {
    const it = items.find(i => i.id === id);
    if (it) {
      document.getElementById('fName' ).value = it.name     || '';
      document.getElementById('fCat'  ).value = it.category || '';
      document.getElementById('fPrice').value = it.price    || '';
      document.getElementById('fQty'  ).value = it.quantity || 1;
      document.getElementById('fBox'  ).value = it.box      || '';
      document.getElementById('fLoc'  ).value = it.location || '';
      document.getElementById('fNotes').value = it.notes    || '';
      if (it.photo) { photoData = it.photo; setZonePhoto(it.photo); }
      else { photoData = null; resetZone(); }
    }
  } else {
    resetForm();
  }
  showModal('addModal');
};

function resetForm() {
  ['fName','fPrice','fBox','fLoc','fNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fCat').value = '';
  document.getElementById('fQty').value = '1';
  photoData = null;
  editingId = null;
  resetZone();
}

function resetZone() {
  const z = document.getElementById('photoZone');
  z.className = 'photo-zone';
  z.onclick = () => zoneClick();
  z.innerHTML = `
    <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24" opacity=".35">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
      <circle cx="12" cy="13" r="3"/>
    </svg>
    <span>Tap to add a photo</span>`;
  document.getElementById('aiBtn').disabled = true;
}

function setZonePhoto(src) {
  const z = document.getElementById('photoZone');
  z.className = 'photo-zone loaded';
  z.onclick = null;
  z.innerHTML = `<img src="${src}" alt="preview">`;
  document.getElementById('aiBtn').disabled = false;
}

// ─── Photo handling ───────────────────────────────────────────────────────────
window.zoneClick   = () => {
  const mob = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  mob ? triggerCamera() : triggerFile();
};
window.triggerCamera = () => { document.getElementById('camIn').click(); };
window.triggerFile   = () => { document.getElementById('fileIn').click(); };

window.onFile = async function (e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  toast('Compressing photo…');
  photoData = await compress(file, 480, 0.72);
  setZonePhoto(photoData);
  toast('Photo ready — tap Analyze with AI!', 'ok');
};

function compress(file, maxW, q) {
  return new Promise(res => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = ev => {
      img.onload = () => {
        let { width: w, height: h } = img;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        res(c.toDataURL('image/jpeg', q));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ─── AI Analysis ─────────────────────────────────────────────────────────────
window.analyzePhoto = async function () {
  if (!photoData) return;
  const btn = document.getElementById('aiBtn');
  const txt = document.getElementById('aiBtnTxt');
  btn.disabled = true;
  txt.innerHTML = '<span class="spin"></span> Analyzing…';

  try {
    const b64  = photoData.split(',')[1];
    const mime = photoData.split(';')[0].slice(5);

    const res = await fetch('/.netlify/functions/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageBase64: b64, mediaType: mime })
    });

    if (!res.ok) {
      const t = await res.text();
      throw new Error(t || `HTTP ${res.status}`);
    }

    const data = await res.json();

    if (data.name)     document.getElementById('fName').value  = data.name;
    if (data.category) {
      const sel = document.getElementById('fCat');
      const opt = [...sel.options].find(o => o.value.toLowerCase() === data.category.toLowerCase());
      if (opt) sel.value = opt.value;
    }
    if (data.price !== undefined && data.price !== null)
      document.getElementById('fPrice').value = data.price;
    if (data.notes) document.getElementById('fNotes').value = data.notes;

    toast('AI filled in the details!', 'ok');
  } catch (err) {
    console.error(err);
    toast('AI analysis failed: ' + err.message, 'err');
  } finally {
    btn.disabled = false;
    txt.innerHTML = '✦ Analyze with AI';
    document.getElementById('aiBtn').disabled = !photoData;
  }
};

// ─── Save ─────────────────────────────────────────────────────────────────────
window.saveItem = async function () {
  const name = document.getElementById('fName').value.trim();
  if (!name) { toast('Item name is required', 'err'); document.getElementById('fName').focus(); return; }

  const data = {
    name,
    category: document.getElementById('fCat'  ).value,
    price:    parseFloat(document.getElementById('fPrice').value) || 0,
    quantity: parseInt(  document.getElementById('fQty'  ).value) || 1,
    box:      document.getElementById('fBox'  ).value.trim(),
    location: document.getElementById('fLoc'  ).value.trim(),
    notes:    document.getElementById('fNotes').value.trim(),
    photo:    photoData || null,
    updatedAt: serverTimestamp(),
  };

  try {
    if (editingId) {
      await updateDoc(doc(db, 'inventory', editingId), data);
      toast('Item updated!', 'ok');
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(collection(db, 'inventory'), data);
      toast('Item saved!', 'ok');
    }
    closeModal('addModal');
  } catch (err) {
    console.error(err);
    toast('Save failed: ' + err.message, 'err');
  }
};

// ─── Detail view ──────────────────────────────────────────────────────────────
window.openDetail = function (id) {
  const it = items.find(i => i.id === id);
  if (!it) return;

  const col = CAT_COLORS[it.category] || '#94a3b8';

  document.getElementById('detailTitle').textContent = it.name || 'Item';
  document.getElementById('detailBody').innerHTML = `
    ${it.photo
      ? `<img class="detail-photo" src="${it.photo}" alt="${xss(it.name)}">`
      : `<div class="detail-photo-placeholder">📦</div>`}
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <span class="tag" style="background:${col}1a;color:${col};font-size:12px">${xss(it.category||'—')}</span>
      <span style="font-size:22px;font-weight:800;color:var(--green)">$${(+(it.price||0)).toFixed(2)}</span>
    </div>
    <div class="dfields">
      <div class="frow">
        <div><div class="dfield-label">Quantity</div><div class="dfield-val">${it.quantity||1}</div></div>
        <div><div class="dfield-label">Box</div><div class="dfield-val">${xss(it.box||'—')}</div></div>
      </div>
      <div><div class="dfield-label">Location</div><div class="dfield-val">${xss(it.location||'—')}</div></div>
      ${it.notes ? `<div><div class="dfield-label">Notes</div><div class="dfield-val" style="line-height:1.6">${xss(it.notes)}</div></div>` : ''}
    </div>
    <div class="detail-actions">
      <button class="btn btn-danger" onclick="deleteItem('${id}')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
        Delete
      </button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('detailModal')">Close</button>
      <button class="btn btn-primary" style="flex:1" onclick="closeModal('detailModal');openAdd('${id}')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
        </svg>
        Edit
      </button>
    </div>`;

  showModal('detailModal');
};

// ─── Delete ───────────────────────────────────────────────────────────────────
window.deleteItem = async function (id) {
  if (!confirm('Delete this item? This cannot be undone.')) return;
  try {
    await deleteDoc(doc(db, 'inventory', id));
    closeModal('detailModal');
    toast('Item deleted.', 'ok');
  } catch (err) {
    toast('Delete failed: ' + err.message, 'err');
  }
};

// ─── Modal helpers ────────────────────────────────────────────────────────────
function showModal(id) {
  document.getElementById(id).classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}
window.closeModal = function (id) {
  document.getElementById(id).classList.add('hidden');
  document.body.style.overflow = '';
};
window.overlayClick = function (e, id) {
  if (e.target === e.currentTarget) closeModal(id);
};

// ─── Toast ────────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg, type = '') {
  let el = document.getElementById('_toast');
  if (!el) {
    el = document.createElement('div');
    el.id = '_toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.className = `toast${type ? ' ' + type : ''}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.remove(), 3000);
}

// ─── XSS sanitize ────────────────────────────────────────────────────────────
function xss(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
